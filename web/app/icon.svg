<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Lokki app icon — SVG so a single asset serves every density
    Chrome/Edge/Android need. iOS Safari prefers PNGs for home-screen
    icons; if that ever matters we add a 180x180 PNG and point
    apple-touch-icon at it. For now the SVG covers Add-to-Home-Screen
    on every browser that handles SVG manifest icons.

    "Maskable" safe zone is the inner 80% circle (≈ radius 205 from
    center 256,256). The 🪴-style glyph below is bounded to ~r=180
    so Android's mask never clips meaningful content.
  -->
  <rect width="512" height="512" rx="96" fill="#4f46e5"/>
  <!-- pagoda silhouette in white. Three stacked tiers — same family
       of glyphs the dashboard uses (🪴 coord, 🍃 leaf), but stripped
       down to a flat icon for OS-level rendering. -->
  <g fill="#ffffff" transform="translate(256 256)">
    <!-- top tier -->
    <rect x="-90" y="-150" width="180" height="22" rx="3"/>
    <polygon points="-110,-128 110,-128 80,-100 -80,-100"/>
    <!-- middle tier -->
    <rect x="-120" y="-78" width="240" height="22" rx="3"/>
    <polygon points="-140,-56 140,-56 100,-22 -100,-22"/>
    <!-- bottom tier -->
    <rect x="-150" y="0" width="300" height="22" rx="3"/>
    <polygon points="-170,22 170,22 130,60 -130,60"/>
    <!-- base -->
    <rect x="-50" y="64" width="100" height="68" rx="6"/>
  </g>
</svg>
