<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#c66a44" stroke-width="1.4">
  <!-- concentric rings + a single bindu at the centre.
       three traditions, one figure: pagoda tier, world-tree's
       root-circle, a stone dropped in a Finnish lake. -->
